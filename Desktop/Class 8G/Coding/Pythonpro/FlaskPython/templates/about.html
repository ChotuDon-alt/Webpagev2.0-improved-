<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage v2.0 - About Us</title>
    <meta name="description" content="Learn more about our ownership, hobbies, and interests. Find details about Aurafic Man.">
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070913;
            --card-bg: rgba(15, 17, 34, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-secondary: #06b6d4;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
            --font-main: 'Outfit', sans-serif;
            --font-sub: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2.5rem 1.5rem;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.12);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 10%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.12);
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            background: rgba(15, 17, 34, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 0.5rem;
            margin-bottom: 2.5rem;
            width: 100%;
            max-width: 720px;
            justify-content: space-around;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .nav-link {
            font-family: var(--font-sub);
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.8rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 14px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: 0.5px;
        }

        .nav-link svg {
            transition: transform 0.3s ease;
            stroke-width: 2.2px;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .nav-link:hover svg {
            transform: translateY(-2px);
        }

        .nav-link.active {
            color: #ffffff;
            background: var(--accent-gradient);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        /* Content Container */
        .container {
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Global Typography and Elements */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.25;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* About Page components */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .profile-subtitle {
            font-size: 0.9rem;
            color: var(--accent-secondary);
            font-weight: 500;
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: var(--transition-smooth);
        }

        .stat-item:hover {
            border-color: rgba(99, 102, 241, 0.25);
            background: rgba(255, 255, 255, 0.03);
            transform: scale(1.01);
        }

        .stat-icon {
            color: var(--accent-secondary);
            background: rgba(6, 182, 212, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-details {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stat-note {
            font-weight: normal;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .aura-infinite {
            background: linear-gradient(45deg, #f43f5e, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 1.3rem;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 1px rgba(244, 63, 94, 0.2)); }
            100% { filter: drop-shadow(0 0 6px rgba(244, 63, 94, 0.6)); }
        }

        /* Responsive styling */
        @media (max-width: 650px) {
            body {
                padding: 1.5rem 1rem;
            }
            .navbar {
                flex-direction: column;
                gap: 0.25rem;
                padding: 0.5rem;
                border-radius: 18px;
            }
            .nav-link {
                width: 100%;
                justify-content: flex-start;
                padding: 0.6rem 1rem;
            }
            .container {
                padding: 2rem 1.5rem;
                gap: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .profile-card {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar" id="main-navigation">
            <a href="/home" id="nav-home" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home Page
            </a>
            <a href="/about" id="nav-about" class="nav-link active">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                About Us
            </a>
            <a href="/contact" id="nav-contact" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                Contact
            </a>
            <a href="/persdet" id="nav-persdet" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                Personal Details
            </a>
            <a href="/follow" id="nav-follow" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Feedback
            </a>
        </nav>
    </header>

    <main class="container">
        <section class="profile-card">
            <div class="profile-avatar" id="about-avatar">A</div>
            <div class="profile-info">
                <h1 id="about-heading">About Us</h1>
                <p class="profile-subtitle">Here you can know about us</p>
            </div>
        </section>

        <section class="stats-container">
            <div class="stat-item" id="stat-name">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="stat-details">
                    <span class="stat-label">Name</span>

            </div>

            <div class="stat-item" id="stat-aura">

                <div class="stat-details">
                    <span class="stat-label">Aura</span>

            </div>

            <div class="stat-item" id="stat-class">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6 6h10M6 10h10"/></svg>
                </div>
                <div class="stat-details">
                    <span class="stat-label">Class</span>
                    <span class="stat-value">Class VIII G <span class="stat-note">(till March 2027)</span></span>
                </div>
            </div>

            <div class="stat-item" id="stat-interests">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                </div>
                <div class="stat-details">
                    <span class="stat-label">Main Interests</span>
                    <span class="stat-value">Cricket & Coding</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
