<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage v2.0 - Feedback</title>
    <meta name="description" content="Share your valuable feedback with us. Use our email form to send suggestions or report issues.">
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070913;
            --card-bg: rgba(15, 17, 34, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-secondary: #06b6d4;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
            --font-main: 'Outfit', sans-serif;
            --font-sub: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2.5rem 1.5rem;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.12);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 10%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.12);
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            background: rgba(15, 17, 34, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 0.5rem;
            margin-bottom: 2.5rem;
            width: 100%;
            max-width: 720px;
            justify-content: space-around;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .nav-link {
            font-family: var(--font-sub);
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.8rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 14px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: 0.5px;
        }

        .nav-link svg {
            transition: transform 0.3s ease;
            stroke-width: 2.2px;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .nav-link:hover svg {
            transform: translateY(-2px);
        }

        .nav-link.active {
            color: #ffffff;
            background: var(--accent-gradient);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        /* Content Container */
        .container {
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Global Typography and Elements */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.25;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-text {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Feedback form components */
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group textarea {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #ffffff;
            font-family: var(--font-main);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .submit-btn {
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: var(--font-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .direct-email-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .direct-email-note a {
            color: var(--accent-secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .direct-email-note a:hover {
            text-decoration: underline;
        }

        /* Responsive styling */
        @media (max-width: 650px) {
            body {
                padding: 1.5rem 1rem;
            }
            .navbar {
                flex-direction: column;
                gap: 0.25rem;
                padding: 0.5rem;
                border-radius: 18px;
            }
            .nav-link {
                width: 100%;
                justify-content: flex-start;
                padding: 0.6rem 1rem;
            }
            .container {
                padding: 2rem 1.5rem;
                gap: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar" id="main-navigation">
            <a href="/home" id="nav-home" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home Page
            </a>
            <a href="/about" id="nav-about" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                About Us
            </a>
            <a href="/contact" id="nav-contact" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                Contact
            </a>
            <a href="/persdet" id="nav-persdet" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                Personal Details
            </a>
            <a href="/follow" id="nav-follow" class="nav-link active">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Feedback
            </a>
        </nav>
    </header>

    <main class="container">
        <section>
            <h1 id="feedback-heading">Give Feedback</h1>
            <p class="welcome-text">We value your opinion! Feel free to fill out the form below to send us your thoughts directly via email.</p>
        </section>

        <section>
            <form class="feedback-form" id="email-feedback-form" action="mailto:abcdabcdabcd@gmail.com" method="post" enctype="text/plain">
                <div class="form-group">
                    <label for="feedback-name">Your Name</label>
                    <input type="text" id="feedback-name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="feedback-email">Your Email</label>
                    <input type="email" id="feedback-email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="feedback-message">Feedback Message</label>
                    <textarea id="feedback-message" name="message" rows="5" placeholder="Share your thoughts with us..." required></textarea>
                </div>
                <button type="submit" id="feedback-submit-btn" class="submit-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    Send Feedback
                </button>
            </form>
        </section>

        <section class="direct-email-note" id="email-note">
            Or send directly to <a href="mailto:abcdabcdabcd@gmail.com" id="feedback-direct-email">abcdabcdabcd@gmail.com</a>
        </section>
    </main>
</body>
</html>
